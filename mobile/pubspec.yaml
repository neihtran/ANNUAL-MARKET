name: truyenthong
description: Ứng dụng Chợ Truyền Thống - Marketplace App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Network
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1
  
  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  
  # Navigation
  go_router: ^14.3.0
  
  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  
  # Utils
  intl: any
  timeago: ^3.7.0
  latlong2: ^0.9.1
  
  # Maps & Location
  flutter_map: ^6.2.1
  geolocator: ^11.0.0
  
  # Pull to refresh
  pull_to_refresh: ^2.0.0

  # Image Picker
  image_picker: ^1.1.2

  # URL Launcher (for payment gateways)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
